name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  go:
    name: ${{ matrix.module }} (build · vet · test)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module: [web, relay]
    defaults:
      run:
        working-directory: ${{ matrix.module }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          # relay has no external deps (no go.sum); let setup-go auto-detect
          # caching per module rather than requiring a fixed path.

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test (race)
        run: go test -race ./...
