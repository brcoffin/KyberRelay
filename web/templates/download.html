<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KyberCrypt — Receive a file</title>
<link rel="icon" type="image/svg+xml" href="/static/kybercrypt-icon.svg">
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="wrap">
    <a href="/"><img class="brand-logo" src="/static/kybercrypt-horizontal.svg" alt="KyberCrypt"></a>
    <div class="card">
      <h1>Receive a file</h1>
      <p class="sub">Enter the passphrase the sender shared with you.</p>
      <form id="f" method="post" action="/api/download/{{.ID}}">
        <label for="passphrase">Passphrase</label>
        <input type="password" id="passphrase" name="passphrase" required autofocus>
        <button type="submit">Decrypt &amp; download</button>
      </form>
      <div class="err" id="err"></div>
    </div>
  </div>
<script>
const f=document.getElementById('f'), err=document.getElementById('err');
f.addEventListener('submit', async e => {
  e.preventDefault(); err.textContent='';
  const res = await fetch(f.action, {method:'POST', body:new FormData(f)});
  if(!res.ok){
    err.textContent = res.status===401 ? 'Wrong passphrase.' :
                      res.status===404 ? 'This file is gone or expired.' : ('Error: '+res.status);
    return;
  }
  const blob = await res.blob();
  const cd = res.headers.get('Content-Disposition') || '';
  const m = /filename="?([^"]+)"?/.exec(cd);
  const name = m ? m[1] : 'download.bin';
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download=name;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
});
</script>
</body>
</html>
