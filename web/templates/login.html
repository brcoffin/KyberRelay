<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KyberCrypt — Log in</title>
<link rel="icon" type="image/svg+xml" href="/static/kybercrypt-icon.svg">
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="wrap">
    <a href="/"><img class="brand-logo" src="/static/kybercrypt-horizontal.svg" alt="KyberCrypt"></a>
    <div class="card">
      <h1>Log in</h1>
      <form id="f">
        <label for="username">Username</label>
        <input id="username" name="username" autocomplete="username" required>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
        <button type="submit">Log in</button>
      </form>
      <div class="err" id="err"></div>
      <div class="alt">No account? <a href="/register">Create one</a></div>
    </div>
  </div>
<script>
const f=document.getElementById('f'), err=document.getElementById('err');
f.addEventListener('submit', async e => {
  e.preventDefault(); err.textContent='';
  const res = await fetch('/api/login', {method:'POST', body:new FormData(f)});
  if(res.ok){ location.href='/app'; } else { err.textContent = await res.text(); }
});
</script>
</body>
</html>
