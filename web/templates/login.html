<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KyberCrypt — Log in</title>
<link rel="icon" type="image/svg+xml" href="/static/kybercrypt-icon.svg">
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="wrap">
    <a href="/"><img class="brand-logo" src="/static/kybercrypt-horizontal.svg" alt="KyberCrypt"></a>
    <div class="card">
      <h1>Log in</h1>
      <form id="f">
        <div id="creds">
          <label for="username">Username</label>
          <input id="username" name="username" autocomplete="username" required>
          <label for="password">Password</label>
          <input id="password" name="password" type="password" autocomplete="current-password" required>
        </div>
        <div id="totpstep" class="hidden">
          <label for="code">Authenticator code</label>
          <input id="code" name="code" inputmode="numeric" autocomplete="one-time-code" placeholder="6-digit code">
        </div>
        <button type="submit" id="loginbtn">Log in</button>
      </form>
      <div class="err" id="err"></div>
      <div class="alt">No account? <a href="/register">Create one</a></div>
    </div>
  </div>
<script src="/static/login.js"></script>
</body>
</html>
