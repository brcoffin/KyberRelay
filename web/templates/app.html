<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kyber-Zip — Inbox</title>
<style>
  :root { color-scheme: dark; }
  body { font: 16px/1.5 system-ui, "Segoe UI", sans-serif; background:#181a1f; color:#ecedf2; margin:0; }
  header { display:flex; justify-content:space-between; align-items:center;
           padding:14px 22px; background:#23272e; border-bottom:1px solid #3a3e48; }
  header .who { color:#9aa0ac; font-size:14px; }
  header form { margin:0; }
  .logout { background:none; border:1px solid #3a3e48; color:#cfd2da; border-radius:8px;
            padding:7px 12px; cursor:pointer; font-size:14px; }
  main { max-width:760px; margin:24px auto; padding:0 16px; }
  .card { background:#23272e; border:1px solid #3a3e48; border-radius:12px; padding:22px; margin-bottom:22px; }
  h2 { margin:0 0 14px; font-size:18px; }
  label { display:block; margin:12px 0 6px; font-size:13px; color:#cfd2da; }
  input { width:100%; box-sizing:border-box; background:#2c313a; border:1px solid #3a3e48;
          color:#ecedf2; border-radius:8px; padding:10px; font-size:15px; }
  button.primary { margin-top:16px; background:#5a9cf8; color:#0b1322; border:0; border-radius:8px;
                   padding:11px 16px; font-size:15px; font-weight:600; cursor:pointer; }
  .status { margin-top:12px; font-size:14px; min-height:18px; }
  table { width:100%; border-collapse:collapse; font-size:14px; }
  th, td { text-align:left; padding:9px 8px; border-bottom:1px solid #2c313a; }
  th { color:#9aa0ac; font-weight:600; }
  a.dl { color:#9fe0a6; }
  .del { background:none; border:0; color:#ef7676; cursor:pointer; font-size:13px; }
  .empty { color:#9aa0ac; }
</style>
</head>
<body>
  <header>
    <div><strong>Kyber-Zip</strong> <span class="who">— {{.User}}</span></div>
    <form method="post" action="/api/logout"><button class="logout" type="submit">Log out</button></form>
  </header>
  <main>
    <div class="card">
      <h2>Send a file</h2>
      <form id="sendf">
        <label for="recipient">Recipient username</label>
        <input id="recipient" name="recipient" required placeholder="who it's for">
        <label for="file">File (max {{.MaxMB}} MB)</label>
        <input id="file" name="file" type="file" required>
        <button class="primary" type="submit">Encrypt &amp; send</button>
      </form>
      <div class="status" id="status"></div>
    </div>

    <div class="card">
      <h2>Inbox</h2>
      {{if .Inbox}}
      <table>
        <tr><th>From</th><th>Size</th><th>Received</th><th></th><th></th></tr>
        {{range .Inbox}}
        <tr>
          <td>{{.Sender}}</td>
          <td>{{.Size}}</td>
          <td>{{.When}}</td>
          <td><a class="dl" href="/api/msg/{{.ID}}">Download</a></td>
          <td><form method="post" action="/api/msg/{{.ID}}/delete" style="margin:0"><button class="del" type="submit">Delete</button></form></td>
        </tr>
        {{end}}
      </table>
      {{else}}
      <div class="empty">No messages yet.</div>
      {{end}}
    </div>
  </main>
<script>
const sf=document.getElementById('sendf'), st=document.getElementById('status');
sf.addEventListener('submit', async e => {
  e.preventDefault(); st.style.color='#9aa0ac'; st.textContent='Sending…';
  const res = await fetch('/api/send', {method:'POST', body:new FormData(sf)});
  if (res.ok) { const j=await res.json(); st.style.color='#9fe0a6'; st.textContent=j.ok; sf.reset(); }
  else { st.style.color='#ef7676'; st.textContent=await res.text(); }
});
</script>
</body>
</html>
