<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KyberCrypt — Inbox</title>
<link rel="icon" type="image/svg+xml" href="/static/kybercrypt-icon.svg">
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header>
    <a class="brand" href="/app">
      <img class="hdr-icon" src="/static/kybercrypt-icon.svg" alt="">
      <span class="wordmark">Kyber<span class="c">Crypt</span></span>
      <span class="who">{{.User}}</span>
    </a>
    <form method="post" action="/api/logout"><button class="logout" type="submit">Log out</button></form>
  </header>
  <main>
    <div class="card">
      <h2>Send a file</h2>
      <form id="sendf">
        <label for="recipient">Recipient username</label>
        <input id="recipient" name="recipient" required placeholder="who it's for">
        <label for="file">File (max {{.MaxMB}} MB)</label>
        <input id="file" name="file" type="file" required>
        <button class="primary" type="submit">Encrypt &amp; send</button>
      </form>
      <div class="status" id="status"></div>
    </div>

    <div class="card">
      <h2>Inbox</h2>
      {{if .Inbox}}
      <table>
        <tr><th>From</th><th>Size</th><th>Received</th><th></th><th></th></tr>
        {{range .Inbox}}
        <tr>
          <td>{{.Sender}}</td>
          <td>{{.Size}}</td>
          <td>{{.When}}</td>
          <td><a class="dl" href="/api/msg/{{.ID}}">Download</a></td>
          <td><form method="post" action="/api/msg/{{.ID}}/delete" style="margin:0"><button class="del" type="submit">Delete</button></form></td>
        </tr>
        {{end}}
      </table>
      {{else}}
      <div class="empty">No messages yet.</div>
      {{end}}
    </div>
  </main>
<script>
const sf=document.getElementById('sendf'), st=document.getElementById('status');
sf.addEventListener('submit', async e => {
  e.preventDefault(); st.style.color='var(--dim)'; st.textContent='Sending…';
  const res = await fetch('/api/send', {method:'POST', body:new FormData(sf)});
  if(res.ok){ const j=await res.json(); st.style.color='var(--ok)'; st.textContent=j.ok; sf.reset(); }
  else { st.style.color='var(--err)'; st.textContent=await res.text(); }
});
</script>
</body>
</html>
