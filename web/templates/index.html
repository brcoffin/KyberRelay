<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KyberCrypt — Send a file</title>
<link rel="icon" type="image/svg+xml" href="/static/kybercrypt-icon.svg">
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="wrap">
    <a href="/"><img class="brand-logo" src="/static/kybercrypt-horizontal.svg" alt="KyberCrypt"></a>
    <div class="card">
      <h1>Send a file</h1>
      <p class="sub">Encrypted before storage. Share the link <em>and</em> the passphrase separately. Have an account? <a href="/login">Log in</a> to send by username.</p>

      <form id="f">
        <label for="file">File (max {{.MaxMB}} MB)</label>
        <input type="file" id="file" name="file" required>

        <label for="passphrase">Passphrase</label>
        <input type="password" id="passphrase" name="passphrase" required placeholder="the recipient must know this">
        <button type="button" id="genpass" class="link-btn">Generate strong passphrase</button>

        <label for="ttl">Expires in (hours)</label>
        <input type="number" id="ttl" name="ttl" value="24" min="1" max="720">

        <div class="opt">
          <input type="checkbox" id="one_time" name="one_time">
          <label for="one_time" style="margin:0">Delete after first download</label>
        </div>

        <button type="submit" id="go">Encrypt &amp; upload</button>
      </form>

      <div class="err" id="err"></div>
      <div class="result" id="result">
        <div>Share this link:</div>
        <a id="link" href="#"></a>
        <div style="margin-top:8px; color:var(--dim); font-size:13px;">Send the passphrase through a different channel.</div>
      </div>
    </div>
  </div>
<script>
// Generate a strong passphrase with the browser's crypto RNG, fill the field,
// and reveal it so it can be copied.
document.getElementById('genpass').addEventListener('click', () => {
  const cs = 'abcdefghjkmnpqrstuvwxyz23456789'; // unambiguous (no 0/O/1/l/I)
  const a = new Uint8Array(20); crypto.getRandomValues(a);
  let s = ''; for (const b of a) s += cs[b % cs.length];
  const pw = document.getElementById('passphrase');
  pw.type = 'text'; pw.value = s; pw.focus();
});
const f=document.getElementById('f'), go=document.getElementById('go'),
      err=document.getElementById('err'), result=document.getElementById('result'),
      link=document.getElementById('link');
f.addEventListener('submit', async e => {
  e.preventDefault(); err.textContent=''; result.classList.remove('show');
  go.disabled=true; go.textContent='Uploading…';
  try {
    const res = await fetch('/api/upload', {method:'POST', body:new FormData(f)});
    if(!res.ok){ throw new Error(await res.text() || ('HTTP '+res.status)); }
    const j = await res.json();
    link.textContent=j.url; link.href=j.url; result.classList.add('show'); f.reset();
  } catch(ex){ err.textContent=ex.message; }
  finally { go.disabled=false; go.textContent='Encrypt & upload'; }
});
</script>
</body>
</html>
