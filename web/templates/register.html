<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KyberCrypt — Create account</title>
<link rel="icon" type="image/svg+xml" href="/static/kybercrypt-icon.svg">
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <div class="wrap">
    <a href="/"><img class="brand-logo" src="/static/kybercrypt-horizontal.svg" alt="KyberCrypt"></a>
    <div class="card">
      <h1>Create account</h1>
      <p class="sub">Generates your post-quantum (ML-KEM) keypair. Your private key is encrypted with your password — if you lose the password, your files are unrecoverable.</p>
      <form id="f">
        <label for="username">Username</label>
        <input id="username" name="username" autocomplete="username" placeholder="3-32 chars: a-z 0-9 _ -" required>
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" placeholder="at least 12 chars, not a breached password" required>
        <button type="submit">Create account</button>
      </form>
      <div class="err" id="err"></div>
      <div class="alt">Already have one? <a href="/login">Log in</a></div>
    </div>
  </div>
<script>
const f=document.getElementById('f'), err=document.getElementById('err');
f.addEventListener('submit', async e => {
  e.preventDefault(); err.textContent='';
  const res = await fetch('/api/register', {method:'POST', body:new FormData(f)});
  if(res.ok){ location.href='/app'; } else { err.textContent = await res.text(); }
});
</script>
</body>
</html>
